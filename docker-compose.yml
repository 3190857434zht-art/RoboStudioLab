name: robostudio

services:
  backend:
    build: ./backend
    container_name: robostudio_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # The start scripts set this to an absolute host path so algorithm
      # containers can mount the same exchange directory.
      - HOST_EXCHANGE_DIR=${HOST_EXCHANGE_DIR}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: robostudio_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      # 本机部署时，用户浏览器通过 localhost 访问后端状态接口，用于自动刷新任务结果。
      - BACKEND_PUBLIC_URL=http://localhost:8000
    depends_on:
      - backend